<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>bebraAI 1.0</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        #chat-container { width: 80%; max-width: 800px; margin: auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        #chat { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #fafafa; }
        .message { margin-bottom: 10px; }
        .user { font-weight: bold; color: #1a73e8; }
        .bot { font-weight: bold; color: #ea4335; }
        #input-container { margin-top: 15px; display: flex; gap: 10px; }
        textarea { width: 70%; height: 60px; border-radius: 5px; padding: 5px; }
        select { width: 20%; border-radius: 5px; padding: 5px; }
        button { width: 10%; border-radius: 5px; background: #1a73e8; color: #fff; border: none; cursor: pointer; }
        button:hover { background: #1666c1; }
        .function-buttons { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        .function-buttons button { width: auto; padding: 5px 10px; background: #34a853; }
        .function-buttons button:hover { background: #2c8c45; }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2>bebraAI 1.0</h2>
        <div id="chat"></div>

        <div id="input-container">
            <textarea id="userMessage" placeholder="Введите сообщение..."></textarea>
            <select id="modelSelect">
                <option value="Mini 1.0">Mini 1.0</option>
                <option value="Standard 1.0">Standard 1.0</option>
            </select>
            <button onclick="sendMessage()">Отправить</button>
        </div>

        <div class="function-buttons">
            <button onclick="insertFunction('код')">Генератор кода</button>
            <button onclick="insertFunction('идеи')">Генератор идей</button>
            <button onclick="insertFunction('учеба')">Учёба</button>
            <button onclick="insertFunction('бизнес')">Бизнес</button>
            <button onclick="insertFunction('развлечения')">Развлечения</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
